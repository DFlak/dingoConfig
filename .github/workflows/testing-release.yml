name: Build and Publish Testing Release

on:
  push:
    branches:
      - testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Testing Release Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' api/api.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Create output directory
        run: mkdir -p publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing

      - name: Build Windows x64
        run: |
          dotnet publish api/api.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -o publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/win-x64

      - name: Build Windows ARM64
        run: |
          dotnet publish api/api.csproj \
            -c Release \
            -r win-arm64 \
            --self-contained true \
            -o publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/win-arm64

      - name: Build Linux x64
        run: |
          dotnet publish api/api.csproj \
            -c Release \
            -r linux-x64 \
            -p:DefineConstants=LINUX \
            --self-contained true \
            -o publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/linux-x64

      - name: Build Linux ARM32
        run: |
          dotnet publish api/api.csproj \
            -c Release \
            -r linux-arm \
            -p:DefineConstants=LINUX \
            --self-contained true \
            -o publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/linux-arm32

      - name: Build Linux ARM64
        run: |
          dotnet publish api/api.csproj \
            -c Release \
            -r linux-arm64 \
            -p:DefineConstants=LINUX \
            --self-contained true \
            -o publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/linux-arm64

      - name: Build macOS x64
        run: |
          dotnet publish api/api.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -o publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/osx-x64

      - name: Build macOS ARM64
        run: |
          dotnet publish api/api.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -o publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/osx-arm64

      - name: Create zip archives
        run: |
          cd publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing

          zip -r dingoConfig-${{ steps.get_version.outputs.version }}-testing-win-x64.zip win-x64/
          zip -r dingoConfig-${{ steps.get_version.outputs.version }}-testing-win-arm64.zip win-arm64/
          zip -r dingoConfig-${{ steps.get_version.outputs.version }}-testing-linux-x64.zip linux-x64/
          zip -r dingoConfig-${{ steps.get_version.outputs.version }}-testing-linux-arm32.zip linux-arm32/
          zip -r dingoConfig-${{ steps.get_version.outputs.version }}-testing-linux-arm64.zip linux-arm64/
          zip -r dingoConfig-${{ steps.get_version.outputs.version }}-testing-osx-x64.zip osx-x64/
          zip -r dingoConfig-${{ steps.get_version.outputs.version }}-testing-osx-arm64.zip osx-arm64/

          cd ../..
          ls -lh publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/*.zip

      - name: Delete existing testing release
        run: gh release delete testing-latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create testing pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: testing-latest
          name: Testing Build (v${{ steps.get_version.outputs.version }})
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/dingoConfig-${{ steps.get_version.outputs.version }}-testing-win-x64.zip
            publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/dingoConfig-${{ steps.get_version.outputs.version }}-testing-win-arm64.zip
            publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/dingoConfig-${{ steps.get_version.outputs.version }}-testing-linux-x64.zip
            publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/dingoConfig-${{ steps.get_version.outputs.version }}-testing-linux-arm32.zip
            publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/dingoConfig-${{ steps.get_version.outputs.version }}-testing-linux-arm64.zip
            publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/dingoConfig-${{ steps.get_version.outputs.version }}-testing-osx-x64.zip
            publish/dingoConfig-${{ steps.get_version.outputs.version }}-testing/dingoConfig-${{ steps.get_version.outputs.version }}-testing-osx-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
